name: Auto Pull Request to Main

on:
  push:
    branches: [dev]

jobs:
  create-pr:
    name: Create Pull Request to Main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: dev
          base: main
          title: "New code ready - merge dev into main"
          body: "Automated PR by CD pipeline. Review and merge when ready."