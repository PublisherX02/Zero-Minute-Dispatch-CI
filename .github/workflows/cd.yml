name: Auto Pull Request to Main

on:
  push:
    branches: [dev]

jobs:
  create-pr:
    name: Create Pull Request to Main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create PR via GitHub CLI
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "New code ready - merge dev into main" \
            --body "Automated PR. CI tests passed on dev. Review and merge when ready." \
            || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}